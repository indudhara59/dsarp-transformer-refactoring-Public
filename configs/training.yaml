seed: 42
epochs: 20
batch_size: 16
evaluation_batch_size: 32
learning_rate: 0.00002
numeric_learning_rate: 0.001
weight_decay: 0.01
gradient_accumulation_steps: 2
max_gradient_norm: 1.0
mixed_precision: bf16
early_stopping_patience: 4
schedule: linear_warmup
warmup_ratio: 0.1
weighted_sampler: true
distributed: auto
fsdp: false
resume_from_checkpoint: null
checkpoint_dir: models/transformer
tensorboard_dir: outputs/evaluations/tensorboard
mlflow: {enabled: false, experiment: dsarp-stage2}

