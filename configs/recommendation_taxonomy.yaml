recommendations:
  split_component: {display_name: Split Component, smell_types: [godComponent], description: Divide an oversized component by cohesive responsibility., intended_effect: Reduce size and responsibility concentration., indicators: [size_composite, god_component_pressure], contraindications: [low cohesion evidence], applicability_prior: 0.72, benefit_prior: 0.82, risk_prior: 0.62, implementation_outline: Identify cohesive class clusters; introduce boundaries; migrate incrementally., warning: Preserve public contracts and dependency direction., family: structural_split}
  extract_subcomponent: {display_name: Extract Subcomponent, smell_types: [godComponent], description: Extract a cohesive internal responsibility., intended_effect: Improve modularity while retaining the parent boundary., indicators: [children_log, loc_log], contraindications: [few children], applicability_prior: 0.75, benefit_prior: 0.72, risk_prior: 0.45, implementation_outline: Cluster related classes and extract an internal component., warning: Avoid a purely cosmetic package split., family: structural_split}
  extract_service: {display_name: Extract Service, smell_types: [godComponent], description: Isolate an independently evolving capability., intended_effect: Separate lifecycle and ownership., indicators: [size_composite, fan_out_norm], contraindications: [tight transactional coupling], applicability_prior: 0.58, benefit_prior: 0.78, risk_prior: 0.75, implementation_outline: Define service contract and migrate capability in slices., warning: Distribution adds operational and consistency costs., family: extraction}
  move_classes: {display_name: Move Classes, smell_types: [godComponent], description: Move misplaced classes to cohesive components., intended_effect: Reduce mixed responsibilities., indicators: [children_log, fan_out_norm], contraindications: [unknown class cohesion], applicability_prior: 0.66, benefit_prior: 0.65, risk_prior: 0.42, implementation_outline: Map dependencies, move low-coupled class clusters, update imports., warning: Validate package visibility and cycles., family: move_responsibility}
  introduce_facade: {display_name: Introduce Facade, smell_types: [godComponent, hubLikeDep], description: Stabilize a narrow entry point over complex internals., intended_effect: Reduce client coupling and exposed surface., indicators: [fan_in_norm, centrality_composite], contraindications: [already narrow API], applicability_prior: 0.70, benefit_prior: 0.68, risk_prior: 0.34, implementation_outline: Identify client use cases; create facade; migrate consumers., warning: A facade does not remove internal responsibility overload., family: boundary}
  introduce_layer: {display_name: Introduce Layer, smell_types: [godComponent], description: Separate responsibilities through an architectural layer., intended_effect: Enforce dependency and responsibility boundaries., indicators: [fan_in_norm, fan_out_norm], contraindications: [latency-sensitive pass-through], applicability_prior: 0.55, benefit_prior: 0.64, risk_prior: 0.55, implementation_outline: Define layer contract and dependency rules; migrate incrementally., warning: Avoid an anemic pass-through layer., family: boundary}
  dependency_inversion: {display_name: Dependency Inversion, smell_types: [unstableDep, hubLikeDep], description: Reverse dependency ownership around a stable abstraction., intended_effect: Prevent stable policy from depending on volatile detail., indicators: [instability_gap_norm, centrality_composite], contraindications: [no stable abstraction boundary], applicability_prior: 0.72, benefit_prior: 0.82, risk_prior: 0.66, implementation_outline: Place abstraction with policy; implement it in the volatile component., warning: Direction changes can have broad architectural impact., family: dependency_direction}
  extract_interface: {display_name: Extract Interface, smell_types: [unstableDep, hubLikeDep], description: Isolate consumers behind a minimal contract., intended_effect: Reduce concrete dependency coupling., indicators: [fan_in_norm, page_rank_norm], contraindications: [single trivial consumer], applicability_prior: 0.74, benefit_prior: 0.70, risk_prior: 0.38, implementation_outline: Derive a consumer-focused interface and migrate callers., warning: Avoid mirroring the entire implementation API., family: abstraction}
  move_abstraction: {display_name: Move Abstraction, smell_types: [unstableDep], description: Relocate an abstraction to its stable owner., intended_effect: Align abstraction ownership with dependency policy., indicators: [instability_gap_norm], contraindications: [shared neutral contract exists], applicability_prior: 0.61, benefit_prior: 0.71, risk_prior: 0.58, implementation_outline: Identify policy owner; move contract; bridge during migration., warning: Review binary and source compatibility., family: dependency_direction}
  introduce_adapter: {display_name: Introduce Adapter, smell_types: [unstableDep], description: Translate a volatile provider behind a stable boundary., intended_effect: Contain provider volatility., indicators: [instability_gap_norm, fan_in_norm], contraindications: [no semantic mismatch], applicability_prior: 0.68, benefit_prior: 0.67, risk_prior: 0.40, implementation_outline: Define stable port and implement provider-specific adapter., warning: Keep translation logic out of domain policy., family: boundary}
  move_responsibility: {display_name: Move Responsibility, smell_types: [unstableDep, hubLikeDep], description: Move behavior to the component owning relevant data or policy., intended_effect: Reduce dependency pressure and coordination., indicators: [fan_out_norm, pressure_score], contraindications: [unclear ownership], applicability_prior: 0.60, benefit_prior: 0.68, risk_prior: 0.55, implementation_outline: Identify ownership seam; move behavior and tests incrementally., warning: Confirm cohesion before moving behavior., family: move_responsibility}
  remove_dependency: {display_name: Remove Dependency, smell_types: [unstableDep], description: Eliminate a redundant or replaceable dependency edge., intended_effect: Reduce coupling directly., indicators: [instability_gap_norm, edge_count_norm], contraindications: [essential collaboration], applicability_prior: 0.48, benefit_prior: 0.75, risk_prior: 0.45, implementation_outline: Trace usage; replace or inline the collaboration; delete edge., warning: Requires code-level proof that the dependency is dispensable., family: dependency_removal}
  merge_components: {display_name: Merge Components, smell_types: [unstableDep], description: Merge components with inseparable lifecycle and responsibility., intended_effect: Remove a harmful boundary., indicators: [low_instability_gap, reciprocal cohesion], contraindications: [high size, independent ownership], applicability_prior: 0.20, benefit_prior: 0.42, risk_prior: 0.82, implementation_outline: Confirm shared lifecycle and cohesion before consolidating., warning: Strong constraints apply; merging may worsen modularity., family: structural_merge}
  split_hub_component: {display_name: Split Hub Component, smell_types: [hubLikeDep], description: Divide inbound and outbound hub responsibilities., intended_effect: Reduce hub concentration and change blast radius., indicators: [hubness_score, size_composite], contraindications: [small cohesive coordinator], applicability_prior: 0.72, benefit_prior: 0.82, risk_prior: 0.68, implementation_outline: Partition coordination roles and migrate dependencies by seam., warning: Preserve ordering and transactional semantics., family: structural_split}
  extract_mediator: {display_name: Extract Mediator, smell_types: [hubLikeDep], description: Move coordination into an explicit mediator., intended_effect: Reduce direct many-way collaboration., indicators: [hubness_score, fan_balance], contraindications: [hub is not coordination-heavy], applicability_prior: 0.77, benefit_prior: 0.76, risk_prior: 0.48, implementation_outline: Extract workflows behind mediator commands and migrate collaborators., warning: Avoid turning the mediator into a new god component., family: coordination}
  introduce_ports_adapters: {display_name: Introduce Ports and Adapters, smell_types: [hubLikeDep], description: Separate core policy from inbound and outbound integrations., intended_effect: Stabilize dependency boundaries around the hub., indicators: [fan_in_norm, fan_out_norm], contraindications: [simple data component], applicability_prior: 0.65, benefit_prior: 0.78, risk_prior: 0.62, implementation_outline: Define use-case ports and infrastructure adapters; invert dependencies., warning: Introduce boundaries incrementally., family: boundary}
  introduce_event_communication: {display_name: Introduce Event-Based Communication, smell_types: [hubLikeDep], description: Decouple suitable collaborators through events., intended_effect: Reduce temporal and structural coupling., indicators: [hubness_score, fan_out_norm], contraindications: [strong consistency, ordered synchronous workflow], applicability_prior: 0.48, benefit_prior: 0.72, risk_prior: 0.88, implementation_outline: Select asynchronous interactions; define durable event contracts., warning: High risk without clear eventual-consistency and operations evidence., family: async_communication}
