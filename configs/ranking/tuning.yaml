study_name: dsarp-lambdamart
storage: sqlite:///outputs/evaluations/ranker_optuna.db
direction: maximize
metric: ndcg@10
secondary_metrics: [ndcg@5, map@10]
trials: 100
seed: 42
search_space:
  max_depth: [3, 10]
  min_child_weight: [1, 12]
  learning_rate: [0.01, 0.2]
  subsample: [0.6, 1.0]
  colsample_bytree: [0.5, 1.0]
  reg_alpha: [0.000001, 10.0]
  reg_lambda: [0.000001, 20.0]
  gamma: [0.0, 5.0]
  n_estimators: [200, 1500]
  embedding_dimensions: [4, 32]

